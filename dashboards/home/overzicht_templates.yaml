# Button-card templates for the "Overzicht" wall dashboard.
# Included at the Lovelace root via ui-lovelace.yaml (button_card_templates).

# --- Person row: avatar initial, name, status, battery -----------------------
ov_person:
  show_icon: false
  show_name: false
  show_state: false
  variables:
    battery: sensor.none
  tap_action:
    action: more-info
  styles:
    grid:
      - grid-template-areas: '"av info bat"'
      - grid-template-columns: 34px 1fr auto
      - align-items: center
      - column-gap: 11px
    card:
      - background: none
      - border: none
      - box-shadow: none
      - padding: 8px 2px
    custom_fields:
      av:
        - grid-area: av
      info:
        - grid-area: info
        - justify-self: start
      bat:
        - grid-area: bat
        - justify-self: end
  custom_fields:
    av: |
      [[[
        var n = entity && entity.attributes.friendly_name ? entity.attributes.friendly_name : '?';
        var home = entity && entity.state === 'home';
        var bg = home ? 'rgba(52,168,120,0.16)' : 'rgba(255,255,255,0.06)';
        var col = home ? '#4ade80' : 'rgba(255,255,255,0.55)';
        return `<div style="width:34px;height:34px;border-radius:50%;background:${bg};color:${col};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;">${n.charAt(0)}</div>`;
      ]]]
    info: |
      [[[
        var fn = entity && entity.attributes.friendly_name ? entity.attributes.friendly_name.split(' ')[0] : '?';
        var home = entity && entity.state === 'home';
        var st = home ? 'thuis' : 'afwezig';
        return `<span style="display:flex;align-items:baseline;gap:9px"><span style="font-size:15px;font-weight:600;color:white">${fn}</span><span style="font-size:13px;color:rgba(255,255,255,0.4)">${st}</span></span>`;
      ]]]
    bat: |
      [[[
        var b = states[variables.battery];
        if(!b || isNaN(Number(b.state))) return '';
        var v = Math.round(Number(b.state));
        var c = v <= 10 ? '#ef4444' : (v <= 20 ? '#f59e0b' : 'white');
        return `<span style="font-size:15px;font-weight:600;color:${c}">${v}%</span>`;
      ]]]

# --- Room row: name, "x lampen aan"/"alles uit", on-dot --------------------
ov_room:
  show_icon: false
  show_name: true
  variables:
    lights: []
  styles:
    grid:
      - grid-template-areas: '"n sum dot"'
      - grid-template-columns: auto 1fr auto
      - align-items: center
      - column-gap: 10px
    card:
      - background: none
      - border: none
      - box-shadow: none
      - padding: 11px 2px
    name:
      - grid-area: n
      - justify-self: start
      - font-size: 14.5px
      - font-weight: "500"
      - color: white
    custom_fields:
      sum:
        - grid-area: sum
        - justify-self: end
        - font-size: 13px
      dot:
        - grid-area: dot
        - justify-self: end
  custom_fields:
    sum: |
      [[[
        var ls = variables.lights || [];
        var on = ls.filter(e => states[e] && states[e].state === 'on').length;
        if(on === 0) return `<span style="color:rgba(255,255,255,0.38)">alles uit</span>`;
        return `<span style="color:rgba(255,255,255,0.62)">${on} ${on===1?'lamp':'lampen'} aan</span>`;
      ]]]
    dot: |
      [[[
        var ls = variables.lights || [];
        var on = ls.filter(e => states[e] && states[e].state === 'on').length;
        var c = on > 0 ? '#3b82f6' : 'rgba(255,255,255,0.14)';
        return `<div style="width:9px;height:9px;border-radius:50%;background:${c}"></div>`;
      ]]]

# --- Power consumer bar row -------------------------------------------------
ov_bar:
  show_name: true
  show_state: false
  show_icon: false
  variables:
    max: 4000
  tap_action:
    action: more-info
  styles:
    grid:
      - grid-template-areas: '"n bar val"'
      - grid-template-columns: 165px 1fr 78px
      - align-items: center
      - column-gap: 14px
    card:
      - background: none
      - border: none
      - box-shadow: none
      - padding: 9px 2px
    name:
      - grid-area: n
      - justify-self: start
      - font-size: 14px
      - color: rgba(255,255,255,0.85)
      - white-space: nowrap
      - overflow: hidden
      - text-overflow: ellipsis
    custom_fields:
      bar:
        - grid-area: bar
      val:
        - grid-area: val
        - justify-self: end
  custom_fields:
    bar: |
      [[[
        var v = entity && !isNaN(Number(entity.state)) ? Number(entity.state) : 0;
        var m = variables.max || 1000;
        var pct = Math.max(2, Math.min(100, v / m * 100));
        return `<div style="width:100%;height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:#3b82f6;border-radius:3px"></div></div>`;
      ]]]
    val: |
      [[[
        var v = entity && !isNaN(Number(entity.state)) ? Math.round(Number(entity.state)) : 0;
        return `<span style="font-size:14px;font-weight:600;color:white">${v} W</span>`;
      ]]]

# --- Climate row: name, temp/doel, action badge ----------------------------
ov_climate:
  show_name: true
  show_icon: false
  show_state: false
  tap_action:
    action: more-info
  styles:
    grid:
      - grid-template-areas: '"n badge" "sub badge"'
      - grid-template-columns: 1fr auto
      - align-items: center
      - column-gap: 10px
    card:
      - background: none
      - border: none
      - box-shadow: none
      - padding: 11px 2px
    name:
      - grid-area: n
      - justify-self: start
      - font-size: 14.5px
      - font-weight: "600"
      - color: white
    custom_fields:
      sub:
        - grid-area: sub
        - justify-self: start
        - font-size: 12.5px
        - color: rgba(255,255,255,0.45)
        - padding-top: 2px
      badge:
        - grid-area: badge
        - justify-self: end
  custom_fields:
    sub: |
      [[[
        var cur = entity.attributes.current_temperature;
        var tgt = entity.attributes.temperature;
        var off = entity.state === 'off' || entity.state === 'unavailable';
        if(cur != null) {
          var s = Number(cur).toFixed(1).replace('.',',') + '°';
          if(!off && tgt != null) s += ' · doel ' + Number(tgt).toFixed(1).replace('.',',') + '°';
          return s;
        }
        return off ? (entity.state === 'unavailable' ? 'niet beschikbaar' : 'uit') : (entity.state || '');
      ]]]
    badge: |
      [[[
        var a = entity.attributes.hvac_action || entity.state;
        var map = {cooling:['koelen','#38bdf8','rgba(56,189,248,0.15)'],
                   heating:['verwarmt','#f59e0b','rgba(245,158,11,0.15)'],
                   idle:['idle','rgba(255,255,255,0.6)','rgba(255,255,255,0.08)'],
                   off:['uit','rgba(255,255,255,0.5)','rgba(255,255,255,0.06)']};
        var m = map[a] || map[entity.state] || [a,'rgba(255,255,255,0.6)','rgba(255,255,255,0.08)'];
        return `<span style="font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:20px;color:${m[1]};background:${m[2]}">${m[0]}</span>`;
      ]]]

# --- Vandaag / list row: icon, title, subtitle -----------------------------
ov_listrow:
  show_icon: false
  show_name: false
  variables:
    title: ""
    mdi: mdi:information
  styles:
    grid:
      - grid-template-areas: '"ic t" "ic s"'
      - grid-template-columns: 40px 1fr
      - align-items: center
      - column-gap: 14px
    card:
      - background: none
      - border: none
      - box-shadow: none
      - padding: 10px 2px
    custom_fields:
      ic:
        - grid-area: ic
      t:
        - grid-area: t
        - justify-self: start
        - font-size: 14.5px
        - font-weight: "600"
        - color: white
      s:
        - grid-area: s
        - justify-self: start
        - font-size: 12.5px
        - color: rgba(255,255,255,0.45)
  custom_fields:
    ic: |
      [[[
        return `<ha-icon icon="${variables.mdi}" style="--mdc-icon-size:22px;color:rgba(255,255,255,0.6)"></ha-icon>`;
      ]]]
    t: |
      [[[ return variables.title; ]]]

# --- Panel title (uppercase label, optional right badge) -------------------
ov_title:
  show_name: false
  show_icon: false
  variables:
    title: ""
    badge: ""
  tap_action:
    action: none
  styles:
    grid:
      - grid-template-areas: '"t b"'
      - grid-template-columns: 1fr auto
      - align-items: center
    card:
      - background: none
      - border: none
      - box-shadow: none
      - padding: 2px 2px 10px 2px
    custom_fields:
      t:
        - grid-area: t
        - justify-self: start
        - font-size: 12px
        - font-weight: "700"
        - letter-spacing: 1.2px
        - color: rgba(255,255,255,0.42)
      b:
        - grid-area: b
        - justify-self: end
  custom_fields:
    t: |
      [[[ return variables.title; ]]]
    b: |
      [[[
        if(!variables.badge) return '';
        return `<span style="font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:20px;color:#4ade80;background:rgba(52,168,120,0.15)">${variables.badge}</span>`;
      ]]]

# --- Header pill -----------------------------------------------------------
ov_pill:
  show_name: false
  show_icon: false
  styles:
    grid:
      - grid-template-areas: '"c"'
    card:
      - background: rgba(255,255,255,0.05)
      - border: 1px solid rgba(255,255,255,0.06)
      - border-radius: 20px
      - padding: 7px 14px
      - height: auto
      - width: max-content
      - overflow: visible
    custom_fields:
      c:
        - font-size: 13px
        - font-weight: "500"
        - white-space: nowrap
        - overflow: visible

kiosk_mode:
  user_settings:
    - users:
        - Robin Bohnen
        - Samantha Henkelman
      kiosk: true
      hide_header: true
      hide_sidebar: true
      hide_menu_button: true
      hide_overflow: true
title: Overzicht
path: overzicht
icon: mdi:view-dashboard-outline
panel: true
cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { height: 100% !important; }
        #root {
          gap: 18px !important;
          min-height: calc(100vh - 8px) !important;
          margin: 0 !important;
          padding: 20px 24px 24px 24px !important;
          background: #0b0d12 !important;
          box-sizing: border-box !important;
        }
        @media (max-width: 800px) {
          #root { padding: 14px 12px 16px 12px !important; gap: 14px !important; }
        }
    cards:
      # =================== HEADER ===================
      - type: horizontal-stack
        card_mod:
          style: |
            #root {
              display: grid !important;
              grid-template-columns: 1fr auto !important;
              align-items: center !important;
              gap: 16px !important;
              padding: 2px 4px 4px 4px !important;
            }
            @media (max-width: 800px) {
              #root { grid-template-columns: 1fr !important; gap: 12px !important; }
            }
        cards:
          - type: custom:button-card
            tap_action:
              action: none
            styles:
              card:
                - background: none
                - border: none
                - box-shadow: none
                - padding: 0
              grid:
                - grid-template-areas: '"h"'
                - justify-items: start
            custom_fields:
              h: |
                [[[
                  var u = (user && typeof user === 'object') ? (user.name || 'thuis') : user;
                  if(u) u = String(u).split(' ')[0];
                  var d = new Date();
                  var days = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
                  var months = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
                  var t = ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
                  var ds = `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} · ${t}`;
                  return `<span style="display:flex;align-items:baseline;gap:12px"><span style="font-size:22px;font-weight:700;color:white">Hallo ${u}</span><span style="font-size:14px;color:rgba(255,255,255,0.4)">${ds}</span></span>`;
                ]]]
          - type: horizontal-stack
            card_mod:
              style: |
                #root { gap: 10px !important; flex-wrap: wrap !important; }
                #root > * { flex: 0 0 auto !important; }
            cards:
              - type: custom:button-card
                template: ov_pill
                tap_action:
                  action: none
                styles:
                  card:
                    - background: >
                        [[[ var g = states['sensor.zonneplan_current_tariff_group']; return (g && g.state === 'low') ? 'rgba(52,168,120,0.14)' : 'rgba(255,255,255,0.05)'; ]]]
                    - border: >
                        [[[ var g = states['sensor.zonneplan_current_tariff_group']; return (g && g.state === 'low') ? '1px solid rgba(52,168,120,0.28)' : '1px solid rgba(255,255,255,0.06)'; ]]]
                custom_fields:
                  c: |
                    [[[
                      var g = states['sensor.zonneplan_current_tariff_group'];
                      var p = states['sensor.zonneplan_current_electricity_tariff'];
                      var lbl = {low:'laag', normal:'gemiddeld', high:'hoog'};
                      var col = {low:'#4ade80', normal:'#f59e0b', high:'#ef4444'};
                      var gs = g ? g.state : 'normal';
                      var price = p ? '€ ' + Number(p.state).toFixed(3).replace('.',',') : '';
                      var txt = gs === 'low' ? '#4ade80' : 'rgba(255,255,255,0.85)';
                      return `<span style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:${col[gs]||'#888'}"></span><span style="color:${txt}">tarief ${lbl[gs]||gs} · ${price}</span></span>`;
                    ]]]
              # Conditioneel: auto laadt
              - type: custom:button-card
                template: ov_pill
                entity: sensor.hrh85f_charge_state
                tap_action:
                  action: navigate
                  navigation_path: "#ov-auto"
                visibility:
                  - condition: state
                    entity: sensor.hrh85f_charge_state
                    state: charge_in_progress
                custom_fields:
                  c: |
                    [[[
                      var b = states['sensor.hrh85f_batterij'];
                      var pct = b && !isNaN(Number(b.state)) ? Math.round(Number(b.state)) : '—';
                      return `<span style="display:flex;align-items:center;gap:7px;color:#4ade80"><ha-icon icon="mdi:ev-station" style="--mdc-icon-size:16px"></ha-icon>auto laadt · ${pct}%</span>`;
                    ]]]
              # Conditioneel: alarm ingeschakeld
              - type: custom:button-card
                template: ov_pill
                entity: alarm_control_panel.alarmo
                tap_action:
                  action: more-info
                visibility:
                  - condition: state
                    entity: alarm_control_panel.alarmo
                    state:
                      - armed_away
                      - armed_home
                      - armed_night
                      - armed_vacation
                custom_fields:
                  c: |
                    [[[
                      return `<span style="display:flex;align-items:center;gap:7px;color:#f59e0b"><ha-icon icon="mdi:shield-lock" style="--mdc-icon-size:16px"></ha-icon>alarm ingeschakeld</span>`;
                    ]]]
              # Conditioneel: stroom wordt straks duurder
              - type: custom:button-card
                template: ov_pill
                tap_action:
                  action: navigate
                  navigation_path: "#ov-energie"
                visibility:
                  - condition: state
                    entity: sensor.zonneplan_forecast_tariff_group_hour_1
                    state: high
                  - condition: state
                    entity: sensor.zonneplan_current_tariff_group
                    state:
                      - low
                      - normal
                custom_fields:
                  c: |
                    [[[
                      var p = states['sensor.zonneplan_forecast_tariff_hour_1'];
                      var price = p && !isNaN(Number(p.state)) ? '€ ' + Number(p.state).toFixed(3).replace('.',',') : '';
                      return `<span style="display:flex;align-items:center;gap:7px;color:#f59e0b"><ha-icon icon="mdi:trending-up" style="--mdc-icon-size:16px"></ha-icon>straks duurder${price ? ' · ' + price : ''}</span>`;
                    ]]]
              # Conditioneel: regen op komst
              - type: custom:button-card
                template: ov_pill
                entity: sensor.neerslag_komende_30_minuten
                tap_action:
                  action: more-info
                visibility:
                  - condition: numeric_state
                    entity: sensor.neerslag_komende_30_minuten
                    above: 0.1
                custom_fields:
                  c: |
                    [[[
                      var r = states['sensor.neerslag_komende_30_minuten'];
                      var mm = r && !isNaN(Number(r.state)) ? Number(r.state).toFixed(1).replace('.',',') : '?';
                      return `<span style="display:flex;align-items:center;gap:7px;color:#38bdf8"><ha-icon icon="mdi:weather-pouring" style="--mdc-icon-size:16px"></ha-icon>regen · ${mm} mm (30 min)</span>`;
                    ]]]
              # Conditioneel: iemand onderweg naar huis
              - type: custom:button-card
                template: ov_pill
                tap_action:
                  action: navigate
                  navigation_path: "#ov-personen"
                visibility:
                  - condition: state
                    entity: binary_sensor.iemand_onderweg_naar_huis
                    state: "on"
                custom_fields:
                  c: |
                    [[[
                      var ppl = [
                        ['Robin','person.robin_bohnen','sensor.robin_reistijd_naar_huis'],
                        ['Samantha','person.samantha_henkelman','sensor.samantha_reistijd_naar_huis'],
                        ['Emma','person.emma_bohnen','sensor.emma_reistijd_naar_huis'],
                        ['Logan','person.logan_veen','sensor.logan_reistijd_naar_huis']
                      ];
                      var best = null;
                      ppl.forEach(function(x){
                        var ps = states[x[1]]; var rs = states[x[2]];
                        if(ps && ['home','unknown','unavailable'].indexOf(ps.state) === -1 && rs && !isNaN(Number(rs.state)) && Number(rs.state) > 0){
                          var t = Number(rs.state);
                          if(best === null || t < best.t) best = {name:x[0], t:t};
                        }
                      });
                      if(!best) return '';
                      return `<span style="display:flex;align-items:center;gap:7px;color:rgba(255,255,255,0.85)"><ha-icon icon="mdi:car" style="--mdc-icon-size:16px;color:#4ade80"></ha-icon>${best.name} thuis · ${Math.round(best.t)} min</span>`;
                    ]]]
              # Conditioneel: zonnescherm-tip (veel zon + scherm omhoog)
              - type: custom:button-card
                template: ov_pill
                tap_action:
                  action: perform-action
                  perform_action: cover.close_cover
                  target:
                    entity_id: cover.achtertuin_zonnescherm
                visibility:
                  - condition: numeric_state
                    entity: sensor.achtertuin_zon_luminance
                    above: 25000
                  - condition: state
                    entity: cover.achtertuin_zonnescherm
                    state: open
                custom_fields:
                  c: |
                    [[[
                      return `<span style="display:flex;align-items:center;gap:7px;color:#f59e0b"><ha-icon icon="mdi:blinds-horizontal" style="--mdc-icon-size:16px"></ha-icon>veel zon · zonnescherm omlaag?</span>`;
                    ]]]
              - type: custom:button-card
                template: ov_pill
                tap_action:
                  action: more-info
                entity: weather.knmi_thuis
                custom_fields:
                  c: |
                    [[[
                      var w = states['weather.knmi_thuis'];
                      if(!w) return 'weer';
                      var t = w.attributes.temperature;
                      var map = {sunny:'zonnig', 'clear-night':'helder', cloudy:'bewolkt', partlycloudy:'half bewolkt', rainy:'regen', pouring:'zware regen', snowy:'sneeuw', 'snowy-rainy':'natte sneeuw', fog:'mist', windy:'winderig', 'windy-variant':'winderig', hail:'hagel', lightning:'onweer', 'lightning-rainy':'onweer', exceptional:'extreem'};
                      var icon = {sunny:'mdi:weather-sunny', 'clear-night':'mdi:weather-night', cloudy:'mdi:weather-cloudy', partlycloudy:'mdi:weather-partly-cloudy', rainy:'mdi:weather-rainy', pouring:'mdi:weather-pouring', snowy:'mdi:weather-snowy', 'snowy-rainy':'mdi:weather-snowy-rainy', fog:'mdi:weather-fog', windy:'mdi:weather-windy', 'windy-variant':'mdi:weather-windy-variant', hail:'mdi:weather-hail', lightning:'mdi:weather-lightning', 'lightning-rainy':'mdi:weather-lightning-rainy', exceptional:'mdi:weather-cloudy-alert'};
                      var s = map[w.state] || w.state;
                      var ic = icon[w.state] || 'mdi:weather-cloudy';
                      return `<span style="display:flex;align-items:center;gap:7px;color:rgba(255,255,255,0.7)"><ha-icon icon="${ic}" style="--mdc-icon-size:16px;color:rgba(255,255,255,0.55)"></ha-icon>${s} · ${t != null ? Math.round(t) : '—'}°</span>`;
                    ]]]

      # =================== BODY (3 columns) ===================
      - type: horizontal-stack
        card_mod:
          style: |
            #root {
              display: grid !important;
              grid-template-columns: 1fr 1.95fr 1fr !important;
              gap: 16px !important;
              align-items: start !important;
            }
            @media (max-width: 1000px) {
              #root { grid-template-columns: 1fr !important; }
            }
        cards:
          # ----------- LEFT COLUMN -----------
          - type: vertical-stack
            card_mod:
              style: |
                #root { gap: 16px !important; }
            cards:
              # PERSONEN
              - type: custom:mod-card
                card_mod:
                  style: &panel |
                    ha-card {
                      background: rgba(22,24,31,0.72) !important;
                      border: 1px solid rgba(255,255,255,0.06) !important;
                      border-radius: 20px !important;
                      box-shadow: none !important;
                      padding: 16px 18px !important;
                    }
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:button-card
                      template: ov_title
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-personen"
                      variables:
                        title: PERSONEN
                      custom_fields:
                        b: |
                          [[[
                            var ppl = ['person.robin_bohnen','person.samantha_henkelman','person.emma_bohnen','person.logan_veen'];
                            var n = ppl.filter(e => states[e] && states[e].state === 'home').length;
                            return `<span style="font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:20px;color:#4ade80;background:rgba(52,168,120,0.15)">${n} thuis</span>`;
                          ]]]
                    - type: custom:button-card
                      template: ov_person
                      entity: person.robin_bohnen
                      variables:
                        battery: sensor.iphone_van_robin_battery_level
                    - type: custom:button-card
                      template: ov_person
                      entity: person.samantha_henkelman
                      variables:
                        battery: sensor.iphone_van_samantha_battery_level
                    - type: custom:button-card
                      template: ov_person
                      entity: person.emma_bohnen
                      variables:
                        battery: sensor.iphone_van_emma_battery_level
                    - type: custom:button-card
                      template: ov_person
                      entity: person.logan_veen
                      variables:
                        battery: sensor.iphone_battery_level
              # RUIMTES
              - type: custom:mod-card
                card_mod:
                  style: *panel
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:button-card
                      template: ov_title
                      variables:
                        title: RUIMTES
                    - type: custom:button-card
                      template: ov_room
                      name: Begane grond
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-groundfloor"
                      variables:
                        lights:
                          - light.woonkamer_lampen
                          - light.keuken_lampen
                          - light.eettafel_lampen
                          - light.entree_lampen
                          - light.trapkast_lampen
                    - type: custom:button-card
                      template: ov_room
                      name: Eerste verdieping
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-firstfloor"
                      variables:
                        lights:
                          - light.badkamer_lampen
                          - light.slaapkamer_lampen
                          - light.slaapkamer_maxi_lampen
                          - light.kantoor_lampen
                          - light.overloop_lampen
                    - type: custom:button-card
                      template: ov_room
                      name: Tweede verdieping
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-secondfloor"
                      variables:
                        lights:
                          - light.overloop_zolder_lampen
                          - light.slaapkamer_mini_lampen
                    - type: custom:button-card
                      template: ov_room
                      name: Garage / speelkamer
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-garage"
                      variables:
                        lights:
                          - light.garage_lampen
                          - light.speelkamer_lampen
                    - type: custom:button-card
                      template: ov_room
                      name: Buiten
                      entity: cover.achtertuin_zonnescherm
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-outside"
                      custom_fields:
                        sum: |
                          [[[
                            var c = states['cover.achtertuin_zonnescherm'];
                            var m = {open:'omhoog', closed:'omlaag', opening:'gaat omhoog', closing:'gaat omlaag'};
                            return `<span style="color:rgba(255,255,255,0.62)">zonnescherm ${c ? (m[c.state] || c.state) : '?'}</span>`;
                          ]]]
                        dot: |
                          [[[
                            var c = states['cover.achtertuin_zonnescherm'];
                            var act = c && c.state !== 'closed';
                            return `<div style="width:9px;height:9px;border-radius:50%;background:${act ? '#3b82f6' : 'rgba(255,255,255,0.14)'}"></div>`;
                          ]]]
              # AUTO
              - type: custom:mod-card
                card_mod:
                  style: *panel
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:button-card
                      template: ov_title
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-auto"
                      variables:
                        title: AUTO
                      custom_fields:
                        b: |
                          [[[
                            var b = states['sensor.hrh85f_batterij'];
                            var r = states['sensor.hrh85f_battery_autonomy'];
                            var bs = b ? Math.round(Number(b.state)) : '?';
                            var rs = r ? Math.round(Number(r.state)) : '?';
                            var col = (typeof bs === 'number' && bs <= 20) ? '#f59e0b' : '#4ade80';
                            var bg = (typeof bs === 'number' && bs <= 20) ? 'rgba(245,158,11,0.15)' : 'rgba(52,168,120,0.15)';
                            return `<span style="font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:20px;color:${col};background:${bg}">${bs}% · ${rs} km</span>`;
                          ]]]
                    - type: custom:button-card
                      entity: sensor.hrh85f_kilometerstand
                      show_icon: false
                      show_name: false
                      show_state: false
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-auto"
                      styles:
                        card:
                          - background: none
                          - border: none
                          - box-shadow: none
                          - padding: 6px 2px 2px 2px
                        grid:
                          - grid-template-areas: '"a b"'
                          - grid-template-columns: 1fr 1fr
                          - column-gap: 12px
                        custom_fields:
                          a:
                            - justify-self: start
                          b:
                            - justify-self: start
                      custom_fields:
                        a: |
                          [[[
                            var e = states['sensor.hrh85f_kilometerstand'];
                            var v = e ? Number(e.state).toLocaleString('nl-NL') : '—';
                            return `<div style="display:flex;flex-direction:column"><span style="font-size:20px;font-weight:700;color:white">${v}</span><span style="font-size:12px;color:rgba(255,255,255,0.42)">km totaal</span></div>`;
                          ]]]
                        b: |
                          [[[
                            var e = states['sensor.hrh85f_charge_state'];
                            var m = {charge_in_progress:'aan het laden', not_in_charge:'niet aan lader', waiting_for_a_planned_charge:'gepland', waiting_for_current_charge:'wacht', charge_error:'laadfout', energy_flap_opened:'klep open', charge_ended:'vol'};
                            var v = e && e.state && e.state !== 'unavailable' ? (m[e.state] || e.state) : '—';
                            return `<div style="display:flex;flex-direction:column"><span style="font-size:18px;font-weight:700;color:white">${v}</span><span style="font-size:12px;color:rgba(255,255,255,0.42)">laadstatus</span></div>`;
                          ]]]

          # ----------- CENTER COLUMN -----------
          - type: vertical-stack
            card_mod:
              style: |
                #root { gap: 16px !important; }
            cards:
              # ENERGIE NU
              - type: custom:mod-card
                card_mod:
                  style: *panel
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:button-card
                      template: ov_title
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-energie"
                      variables:
                        title: ENERGIE · NU
                      custom_fields:
                        b: |
                          [[[
                            var g = states['sensor.zonneplan_current_tariff_group'];
                            var solar = states['sensor.solar_power_generated_now'];
                            var cheap = g && g.state === 'low';
                            var green = solar && Number(solar.state) > 0.1;
                            var txt = (green && cheap) ? 'stroom is groen en goedkoop' : (cheap ? 'stroom is goedkoop' : (green ? 'stroom is groen' : 'normaal tarief'));
                            var col = (green || cheap) ? '#4ade80' : 'rgba(255,255,255,0.6)';
                            return `<span style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:${col}"><span style="width:8px;height:8px;border-radius:50%;background:${col}"></span>${txt}</span>`;
                          ]]]
                    # stats row
                    - type: custom:button-card
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-energie"
                      card_mod:
                        style: |
                          @media (max-width: 800px) {
                            #container {
                              grid-template-columns: 1fr 1fr !important;
                              grid-template-areas: "net prod" "cons batt" !important;
                              row-gap: 18px !important;
                            }
                          }
                      styles:
                        card:
                          - background: none
                          - border: none
                          - box-shadow: none
                          - padding: 6px 2px 10px 2px
                        grid:
                          - grid-template-areas: '"net prod cons batt"'
                          - grid-template-columns: 1.5fr 1fr 1fr 1.1fr
                          - align-items: end
                          - column-gap: 10px
                          - row-gap: 16px
                        custom_fields:
                          net:
                            - justify-self: start
                          prod:
                            - justify-self: start
                          cons:
                            - justify-self: start
                          batt:
                            - justify-self: start
                      custom_fields:
                        net: |
                          [[[
                            var e = states['sensor.live_energieverbruik_totaal'];
                            var raw = e && !isNaN(Number(e.state)) ? Number(e.state) : null;
                            if(raw !== null && Math.abs(raw) < 0.005) raw = 0;
                            var v = raw !== null ? raw.toFixed(2).replace('.',',') : '—';
                            var u = e ? (e.attributes.unit_of_measurement || 'kW') : 'kW';
                            return `<div style="display:flex;flex-direction:column;gap:3px"><div><span style="font-size:38px;font-weight:700;color:white;line-height:1">${v}</span> <span style="font-size:15px;color:rgba(255,255,255,0.5)">${u}</span></div><div style="font-size:12.5px;color:rgba(255,255,255,0.42)">netto verbruik</div></div>`;
                          ]]]
                        prod: |
                          [[[
                            var e = states['sensor.solar_power_generated_now'];
                            var v = '—';
                            if(e && !isNaN(Number(e.state))) {
                              var raw = Number(e.state);
                              var u = e.attributes.unit_of_measurement || '';
                              var kw = (u === 'W') ? raw / 1000 : raw;
                              v = kw.toFixed(2).replace('.',',');
                            }
                            return `<div style="display:flex;flex-direction:column;gap:3px"><div><span style="font-size:26px;font-weight:700;color:#4ade80;line-height:1">${v}</span> <span style="font-size:13px;color:rgba(255,255,255,0.5)">kW</span></div><div style="font-size:12.5px;color:rgba(255,255,255,0.42)">productie</div></div>`;
                          ]]]
                        cons: |
                          [[[
                            var e = states['sensor.electricity_meter_energieverbruik'];
                            var v = e ? Number(e.state).toFixed(2).replace('.',',') : '—';
                            var u = e ? (e.attributes.unit_of_measurement || 'kW') : 'kW';
                            return `<div style="display:flex;flex-direction:column;gap:3px"><div><span style="font-size:26px;font-weight:700;color:white;line-height:1">${v}</span> <span style="font-size:13px;color:rgba(255,255,255,0.5)">${u}</span></div><div style="font-size:12.5px;color:rgba(255,255,255,0.42)">verbruik</div></div>`;
                          ]]]
                        batt: |
                          [[[
                            var p = states['sensor.lilygo_rs485_marstek_battery_power'];
                            var soc = states['sensor.lilygo_rs485_marstek_battery_state_of_charge'];
                            var pv = p && !isNaN(Number(p.state)) ? Math.round(Number(p.state)) : null;
                            var socv = soc && !isNaN(Number(soc.state)) ? Math.round(Number(soc.state)) : null;
                            var mode = pv === null ? '' : (pv < 0 ? 'ontlaadt' : (pv > 0 ? 'laadt' : 'idle'));
                            var disp = pv === null ? '—' : pv + ' W';
                            var socStr = socv === null ? '' : ` <span style="font-size:13px;color:rgba(255,255,255,0.5)">· ${socv}%</span>`;
                            return `<div style="display:flex;flex-direction:column;gap:3px"><div><span style="font-size:26px;font-weight:700;color:white;line-height:1">${disp}</span>${socStr}</div><div style="font-size:12.5px;color:rgba(255,255,255,0.42)">batterij${mode ? ' · ' + mode : ''}</div></div>`;
                          ]]]
                    # live chart

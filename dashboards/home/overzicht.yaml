      - type: custom:bubble-card
        card_type: pop-up
        hash: "#ov-media"
        name: Media
        icon: mdi:music
        styles: *ov_popup
        cards:
          - type: grid
            columns: 2
            square: false
            cards:
              # ---- Overkapping toggle ----
              - type: custom:mushroom-template-card
                primary: Overkapping erbij
                secondary: bij Woonkamer voegen
                icon: mdi:speaker-multiple
                icon_color: blue
                visibility:
                  - condition: state
                    entity: binary_sensor.sonos_overkapping_bij_woonkamer
                    state: "off"
                tap_action:
                  action: perform-action
                  perform_action: media_player.join
                  target:
                    entity_id: media_player.woonkamer_sonos
                  data:
                    group_members:
                      - media_player.overkapping_sonos
              - type: custom:mushroom-template-card
                primary: Overkapping eraf
                secondary: loskoppelen
                icon: mdi:speaker-off
                icon_color: orange
                visibility:
                  - condition: state
                    entity: binary_sensor.sonos_overkapping_bij_woonkamer
                    state: "on"
                tap_action:
                  action: perform-action
                  perform_action: media_player.unjoin
                  target:
                    entity_id: media_player.overkapping_sonos
              # ---- Benedenverdieping toggle ----
              - type: custom:mushroom-template-card
                primary: Benedenverdieping
                secondary: samen afspelen
                icon: mdi:home-floor-0
                icon_color: blue
                visibility:
                  - condition: state
                    entity: binary_sensor.sonos_benedenverdieping_samen
                    state: "off"
                tap_action:
                  action: perform-action
                  perform_action: media_player.join
                  target:
                    entity_id: media_player.woonkamer_sonos
                  data:
                    group_members:
                      - media_player.keuken_sonos
                      - media_player.entree_sonos
                      - media_player.toilet_sonos
                      - media_player.overkapping_sonos
              - type: custom:mushroom-template-card
                primary: Benedenverdieping uit
                secondary: loskoppelen
                icon: mdi:home-floor-0
                icon_color: orange
                visibility:
                  - condition: state
                    entity: binary_sensor.sonos_benedenverdieping_samen
                    state: "on"
                tap_action:
                  action: perform-action
                  perform_action: media_player.unjoin
                  target:
                    entity_id:
                      - media_player.keuken_sonos
                      - media_player.entree_sonos
                      - media_player.toilet_sonos
                      - media_player.overkapping_sonos
              # ---- Gehele huis toggle ----
              - type: custom:mushroom-template-card
                primary: Gehele huis
                secondary: alle speakers samen
                icon: mdi:home-group
                icon_color: green
                visibility:
                  - condition: state
                    entity: binary_sensor.sonos_gehele_huis_samen
                    state: "off"
                tap_action:
                  action: perform-action
                  perform_action: media_player.join
                  target:
                    entity_id: media_player.woonkamer_sonos
                  data:
                    group_members:
                      - media_player.keuken_sonos
                      - media_player.overkapping_sonos
                      - media_player.entree_sonos
                      - media_player.toilet_sonos
                      - media_player.kantoor_sonos
                      - media_player.speelkamer_sonos
                      - media_player.garage_sonos
                      - media_player.badkamer_sonos
                      - media_player.slaapkamer_maxi_sonos
                      - media_player.slaapkamer_mini_sonos
              - type: custom:mushroom-template-card
                primary: Gehele huis uit
                secondary: alles loskoppelen
                icon: mdi:home-group
                icon_color: orange
                visibility:
                  - condition: state
                    entity: binary_sensor.sonos_gehele_huis_samen
                    state: "on"
                tap_action:
                  action: perform-action
                  perform_action: media_player.unjoin
                  target:
                    entity_id:
                      - media_player.woonkamer_sonos
                      - media_player.keuken_sonos
                      - media_player.overkapping_sonos
                      - media_player.entree_sonos
                      - media_player.toilet_sonos
                      - media_player.kantoor_sonos
                      - media_player.speelkamer_sonos
                      - media_player.garage_sonos
                      - media_player.badkamer_sonos
                      - media_player.slaapkamer_maxi_sonos
                      - media_player.slaapkamer_mini_sonos
              # ---- Alles los (altijd) ----
              - type: custom:mushroom-template-card
                primary: Alles los
                secondary: alle groepen ontkoppelen
                icon: mdi:speaker-off
                icon_color: red
                tap_action:
                  action: perform-action
                  perform_action: media_player.unjoin
                  target:
                    entity_id:
                      - media_player.woonkamer_sonos
                      - media_player.keuken_sonos
                      - media_player.overkapping_sonos
                      - media_player.entree_sonos
                      - media_player.toilet_sonos
                      - media_player.kantoor_sonos
                      - media_player.speelkamer_sonos
                      - media_player.garage_sonos
                      - media_player.badkamer_sonos
                      - media_player.slaapkamer_maxi_sonos
                      - media_player.slaapkamer_mini_sonos
          - type: custom:mini-media-player
            entity: media_player.woonkamer_sonos
            artwork: cover
            source: icon

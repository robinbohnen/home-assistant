              # MEDIA
              - type: custom:mod-card
                card_mod:
                  style: *panel
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:button-card
                      template: ov_title
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-media"
                      variables:
                        title: MEDIA
                    - type: custom:button-card
                      show_icon: false
                      show_name: false
                      show_state: false
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-media"
                      styles:
                        card:

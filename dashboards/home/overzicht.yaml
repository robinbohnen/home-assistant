                              - border-radius: 12px
                              - padding: 8px
                              - width: 42px
                              - height: 42px
                            icon:
                              - color: rgba(255,255,255,0.8)
                              - width: 22px
              # BRANDWEER
              - type: custom:mod-card
                card_mod:
                  style: *panel
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:button-card
                      template: ov_title
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-brandweer"
                      variables:
                        title: BRANDWEER
                      custom_fields:
                        b: |
                          [[[
                            var p = states['input_select.brandweer_dienstdoende_ploeg'];
                            var t = p ? p.state : '—';
                            return `<span style="font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:20px;color:#38bdf8;background:rgba(56,189,248,0.15)">${t}</span>`;
                          ]]]
                    - type: custom:button-card
                      entity: input_text.brandweer_laatste_melding
                      show_icon: false
                      show_name: false
                      show_state: false
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-brandweer"
                      styles:
                        card:
                          - background: none
                          - border: none
                          - box-shadow: none
                          - padding: 8px 2px
                        grid:
                          - grid-template-areas: '"pri msg badge" "pri sub badge"'
                          - grid-template-columns: 44px 1fr auto
                          - align-items: center
                          - column-gap: 12px
                        custom_fields:
                          pri:
                            - grid-area: pri
                          msg:
                            - grid-area: msg
                            - justify-self: start
                          sub:
                            - grid-area: sub
                            - justify-self: start
                          badge:
                            - grid-area: badge
                            - justify-self: end
                      custom_fields:
                        pri: |
                          [[[
                            var e = states['input_text.brandweer_laatste_melding'];
                            var t = e && e.state ? e.state : '';
                            var m = t.match(/^\s*([A-Pa-p])\s*(\d)/);
                            if(m){
                              var code = (m[1] + m[2]).toUpperCase();
                              return `<div style="min-width:34px;height:34px;padding:0 8px;box-sizing:border-box;border-radius:9px;background:rgba(245,158,11,0.16);color:#f59e0b;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">${code}</div>`;
                            }
                            return `<div style="width:38px;height:38px;border-radius:10px;background:rgba(245,158,11,0.16);color:#f59e0b;display:flex;align-items:center;justify-content:center"><ha-icon icon="mdi:fire-truck" style="--mdc-icon-size:20px"></ha-icon></div>`;
                          ]]]
                        msg: |
                          [[[
                            var e = states['input_text.brandweer_laatste_melding'];
                            var t = e && e.state ? e.state : 'Geen recente melding';
                            t = t.replace(/^\s*[A-Pa-p]\s*\d\s*/, '');
                            if(t.length > 46) t = t.slice(0,45) + '…';
                            return `<span style="font-size:14px;font-weight:600;color:white">${t}</span>`;
                          ]]]
                        sub: |
                          [[[
                            var d = states['input_datetime.brandweer_laatste_melding'];
                            if(!d || !d.state) return `<span style="font-size:12px;color:rgba(255,255,255,0.42)">—</span>`;
                            var dt = new Date(d.state.replace(' ','T'));
                            var s = dt.toLocaleDateString('nl-NL',{day:'numeric',month:'short'}) + ' ' + dt.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
                            return `<span style="font-size:12px;color:rgba(255,255,255,0.42)">${s}</span>`;
                          ]]]

                                return `<span style="color:rgba(255,255,255,0.8)">gas · ${g ? Number(g.state).toFixed(2).replace('.',',') : '—'} m³</span>`;
                              ]]]
                        - type: custom:button-card
                          template: ov_pill
                          entity: sensor.total_costs_today_calculated
                          tap_action:
                            action: more-info
                          custom_fields:
                            c: |
                              [[[
                                var k = states['sensor.total_costs_today_calculated'];
                                var v = k && !isNaN(Number(k.state)) ? Number(k.state) : 0;
                                var col = v < 0 ? '#4ade80' : 'rgba(255,255,255,0.85)';
                                return `<span style="color:${col};font-weight:600">kosten vandaag · € ${v.toFixed(2).replace('.',',')}</span>`;
                              ]]]
              # VEELGEBRUIKERS
              - type: custom:mod-card
                card_mod:
                  style: *panel
                card:

                        grid:
                          - grid-template-areas: '"art info ctl"'
                          - grid-template-columns: 52px 1fr auto
                          - align-items: center
                          - column-gap: 14px
                        custom_fields:
                          art:
                            - grid-area: art
                          info:
                            - grid-area: info
                            - justify-self: start
                            - overflow: hidden
                          ctl:
                            - grid-area: ctl
                            - justify-self: end
                      custom_fields:
                        art: |
                          [[[
                            var sonos = ['media_player.woonkamer_sonos','media_player.keuken_sonos','media_player.overkapping_sonos','media_player.speelkamer_sonos','media_player.kantoor_sonos','media_player.badkamer_sonos','media_player.entree_sonos','media_player.toilet_sonos','media_player.garage_sonos','media_player.slaapkamer_maxi_sonos','media_player.slaapkamer_mini_sonos'];
                            var active = sonos.find(e => states[e] && states[e].state === 'playing');
                            var s = active ? states[active] : null;
                            var pic = s && s.attributes.entity_picture ? s.attributes.entity_picture : null;
                            if(pic) return `<div style="width:52px;height:52px;border-radius:10px;background-image:url('${pic}');background-size:cover;background-position:center"></div>`;
                            return `<div style="width:52px;height:52px;border-radius:10px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center"><ha-icon icon="mdi:music" style="--mdc-icon-size:24px;color:rgba(255,255,255,0.5)"></ha-icon></div>`;
                          ]]]
                        info: |
                          [[[
                            var sonos = ['media_player.woonkamer_sonos','media_player.keuken_sonos','media_player.overkapping_sonos','media_player.speelkamer_sonos','media_player.kantoor_sonos','media_player.badkamer_sonos','media_player.entree_sonos','media_player.toilet_sonos','media_player.garage_sonos','media_player.slaapkamer_maxi_sonos','media_player.slaapkamer_mini_sonos'];
                            var active = sonos.find(e => states[e] && states[e].state === 'playing');
                            if(!active) return `<div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:14.5px;font-weight:600;color:white">Niets speelt</span><span style="font-size:12.5px;color:rgba(255,255,255,0.42)">tik voor multiroom</span></div>`;
                            var s = states[active];
                            var title = s.attributes.media_title || 'Speelt';
                            var artist = s.attributes.media_artist || s.attributes.media_album_name || '';
                            if(title.length > 34) title = title.slice(0,33) + '…';
                            if(artist.length > 38) artist = artist.slice(0,37) + '…';
                            return `<div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:14.5px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${title}</span><span style="font-size:12.5px;color:rgba(255,255,255,0.42);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${artist}</span></div>`;
                          ]]]
                        ctl: |
                          [[[
                            var sonos = ['media_player.woonkamer_sonos','media_player.keuken_sonos','media_player.overkapping_sonos','media_player.speelkamer_sonos','media_player.kantoor_sonos','media_player.badkamer_sonos','media_player.entree_sonos','media_player.toilet_sonos','media_player.garage_sonos','media_player.slaapkamer_maxi_sonos','media_player.slaapkamer_mini_sonos'];
                            var active = sonos.find(e => states[e] && states[e].state === 'playing');
                            if(!active) return `<ha-icon icon="mdi:speaker-off" style="--mdc-icon-size:20px;color:rgba(255,255,255,0.25)"></ha-icon>`;
                            var s = states[active];
                            var name = s.attributes.friendly_name ? s.attributes.friendly_name.replace(/ ?Sonos/i,'').trim() : '';
                            var grp = s.attributes.group_members ? s.attributes.group_members.length : 1;
                            var badge = grp > 1 ? ` <span style="color:#3b82f6;font-weight:600">+${grp-1}</span>` : '';
                            return `<span style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:rgba(255,255,255,0.6)"><ha-icon icon="mdi:speaker" style="--mdc-icon-size:16px;color:#4ade80"></ha-icon>${name}${badge}</span>`;
                          ]]]

          # ----------- RIGHT COLUMN -----------
          - type: vertical-stack
            card_mod:

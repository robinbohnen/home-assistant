                      show_name: false
                      show_state: false
                      tap_action:
                        action: navigate
                        navigation_path: "#ov-brandweer"
                      styles:
                        card:
                          - background: none
                          - border: none
                          - box-shadow: none
                          - padding: 11px 2px
                          - border-top: 1px solid rgba(255,255,255,0.06)
                        grid:
                          - grid-template-areas: '"lbl val"'
                          - grid-template-columns: 1fr auto
                          - align-items: center
                        custom_fields:
                          lbl:
                            - justify-self: start
                          val:
                            - justify-self: end
                      custom_fields:
                        lbl: |
                          [[[
                            var ds = states['input_select.brandweer_dienstdoende_ploeg'];
                            var p = ds && ds.state ? ds.state.charAt(0).toUpperCase() : '?';
                            return `<span style="font-size:14px;font-weight:600;color:white">Bezetting ${p}-ploeg</span>`;
                          ]]]
                        val: |
                          [[[
                            var ds = states['input_select.brandweer_dienstdoende_ploeg'];
                            var letter = ds && ds.state ? ds.state.charAt(0).toUpperCase() : '';
                            var map = {A:'sensor.bezetting_ploeg_a', B:'sensor.bezetting_ploeg_b', C:'sensor.bezetting_ploeg_c'};
                            var s = states[map[letter]];
                            var n = s && !isNaN(Number(s.state)) ? Number(s.state) : null;
                            if(n === null) return `<span style="font-size:13px;color:rgba(255,255,255,0.4)">—</span>`;
                            var col = n < 4 ? '#ef4444' : (n < 6 ? '#f59e0b' : '#4ade80');
                            return `<span style="display:flex;align-items:center;gap:8px"><span style="width:9px;height:9px;border-radius:50%;background:${col}"></span><span style="font-size:17px;font-weight:700;color:${col}">${n}</span><span style="font-size:12px;color:rgba(255,255,255,0.42)">beschikbaar</span></span>`;
                          ]]]
                    - type: custom:button-card
                      tap_action:
                        action: none
                      styles:
                        card:
                          - background: none
                          - border: none
                          - box-shadow: none
                          - padding: 10px 2px 2px 2px
                          - border-top: 1px solid rgba(255,255,255,0.06)
                        grid:
                          - grid-template-areas: '"tot a b c"'
                          - grid-template-columns: 1.4fr 1fr 1fr 1fr
                          - align-items: center
                      custom_fields:
                        tot: |
                          [[[
                            var e = states['counter.brandweer_totaal_aantal_uitrukken'];
                            return `<span><span style="font-size:16px;font-weight:700;color:white">${e ? e.state : '—'}</span> <span style="font-size:12px;color:rgba(255,255,255,0.42)">totaal</span></span>`;
                          ]]]
                        a: |
                          [[[
                            var e = states['counter.brandweer_uden_a_ploeg_uitrukken'];

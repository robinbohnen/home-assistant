zigbee_package:
  input_boolean:
    zigbee_fix_cooldown:
      name: "Zigbee fix - in cooldown"
      icon: mdi:timer-pause-outline

  automation:
    - id: zigbee_fix_slzb
      alias: Zigbee - Fix unavailability
      description: Escalating recovery (soft → hard) for the living-room Zigbee group
      mode: single
      triggers:
        - trigger: state
          entity_id:
            - light.woonkamer_lampen
          to: unavailable
          for:
            minutes: 30
      conditions:
        - condition: state
          entity_id: input_boolean.zigbee_fix_cooldown
          state: "off"
      actions:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.zigbee_fix_cooldown

        # Step 1 — soft: ask zigbee2mqtt to restart its own process
        - action: mqtt.publish
          data:
            topic: zigbee2mqtt/bridge/request/restart
            payload: ""
        - delay:
            minutes: 5

        # Step 2 — restart Zigbee stack on coordinator, then full SLZB reboot
        - if:
            - condition: state
              entity_id: light.woonkamer_lampen
              state: unavailable
          then:
            - action: button.press
              target:
                entity_id: button.slzb_mr3_zigbee_opnieuw_opstarten
            - delay:
                seconds: 30
            - action: button.press
              target:
                entity_id: button.slzb_mr3_core_restart
            - delay:
                minutes: 10

        # Step 3 — reboot the zigbee2mqtt VM (but not MQTT yet).
        # Entity name is misleading: VM 100 is now zigbee2mqtt in Proxmox, HA cached the old name.
        - if:
            - condition: state
              entity_id: light.woonkamer_lampen
              state: unavailable
          then:
            - action: button.press
              target:
                entity_id: button.qemu_mqtt_100_reboot
            - delay:
                minutes: 10

        # Step 4 — last resort: also reboot the MQTT broker LXC
        - if:
            - condition: state
              entity_id: light.woonkamer_lampen
              state: unavailable
          then:
            - action: button.press
              target:
                entity_id: button.lxc_mqtt_kroon18_slimhuys_nl_108_reboot

    - id: zigbee_fix_cooldown_clear
      alias: Zigbee - Clear fix cooldown
      description: Release the fix cooldown after 1 hour or on Home Assistant start
      mode: single
      triggers:
        - trigger: state
          entity_id: input_boolean.zigbee_fix_cooldown
          to: "on"
          for:
            minutes: 60
        - trigger: homeassistant
          event: start
      actions:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.zigbee_fix_cooldown

zigbee_package:
  input_boolean:
    zigbee_fix_cooldown:
      name: "Zigbee fix - in cooldown"
      icon: mdi:timer-pause-outline

  automation:
    - id: zigbee_fix_slzb
      alias: Zigbee - Fix unavailability
      description: Recover from a stuck zigbee2mqtt-to-coordinator link, escalating from soft to hard
      mode: single
      triggers:
        - trigger: state
          entity_id:
            - binary_sensor.zigbee2mqtt_bridge_connection_state_3
          to:
            - "off"
            - "unavailable"
          for:
            minutes: 10
      conditions:
        - condition: state
          entity_id: input_boolean.zigbee_fix_cooldown
          state: "off"
      actions:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.zigbee_fix_cooldown

        # Step 1 — soft: ask z2m to restart its own process via MQTT.
        # Only works if z2m still consumes MQTT; harmless no-op otherwise.
        - action: mqtt.publish
          data:
            topic: zigbee2mqtt/bridge/request/restart
            payload: ""
        - delay:
            minutes: 2

        # Step 2 — hard: reboot the zigbee2mqtt VM.
        # Entity name lies: VM 100 is now zigbee2mqtt in Proxmox, HA cached the old name.
        - if:
            - condition: state
              entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state_3
              state:
                - "off"
                - "unavailable"
          then:
            - action: button.press
              target:
                entity_id: button.qemu_mqtt_100_reboot
            - delay:
                minutes: 2

        # Step 3 — reset the SLZB coordinator (Zigbee stack first, then full core)
        - if:
            - condition: state
              entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state_3
              state:
                - "off"
                - "unavailable"
          then:
            - action: button.press
              target:
                entity_id: button.slzb_mr3_zigbee_opnieuw_opstarten
            - delay:
                seconds: 30
            - action: button.press
              target:
                entity_id: button.slzb_mr3_core_restart
            - delay:
                minutes: 2

        # Step 4 — last resort: also reboot the MQTT broker LXC
        - if:
            - condition: state
              entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state_3
              state:
                - "off"
                - "unavailable"
          then:
            - action: button.press
              target:
                entity_id: button.lxc_mqtt_kroon18_slimhuys_nl_108_reboot

        # Step 5 — realllast resort: stop everything and start clean
        - if:
            - condition: state
              entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state_3
              state:
                - "off"
                - "unavailable"
          then:
            - action: button.press
              target:
                entity_id: button.lxc_mqtt_kroon18_slimhuys_nl_108_stop
            - action: button.press
              target:
                entity_id: button.qemu_mqtt_100_stop
            - delay:
                minutes: 2
            - action: button.press
              target:
                entity_id: button.slzb_mr3_core_restart
            - delay:
                minutes: 1
            - action: button.press
              target:
                entity_id: button.lxc_mqtt_kroon18_slimhuys_nl_108_start
            - delay:
                minutes: 1
            - action: button.press
              target:
                entity_id: button.qemu_mqtt_100_start

    - id: zigbee_fix_cooldown_clear
      alias: Zigbee - Clear fix cooldown
      description: Release the fix cooldown after 1 hour or on Home Assistant start
      mode: single
      triggers:
        - trigger: state
          entity_id: input_boolean.zigbee_fix_cooldown
          to: "on"
          for:
            minutes: 60
        - trigger: homeassistant
          event: start
      actions:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.zigbee_fix_cooldown
